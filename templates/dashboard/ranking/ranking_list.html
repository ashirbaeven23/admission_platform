{% extends 'base.html' %}

{% block content %}

<section class="py-16">

    <div class="max-w-7xl mx-auto px-4">

        <h1 class="text-6xl font-black mb-12">

            Рейтинг специальностей

        </h1>

        <div class="grid lg:grid-cols-3 gap-8">

            {% for speciality in specialities %}

                <div class="bg-white rounded-[32px] shadow-lg p-8">

                    <h2 class="text-3xl font-black mb-5">

                        {{ speciality.title }}

                    </h2>

                    <div class="text-slate-500 mb-8">

                        {{ speciality.department.name }}

                    </div>

                    <a
                        href="/dashboard/ranking/{{ speciality.id }}/"
                        class="block text-center bg-blue-600 text-white py-4 rounded-2xl font-bold"
                    >
                        Открыть рейтинг
                    </a>

                </div>

            {% endfor %}

        </div>

    </div>

</section>

{% endblock %}
