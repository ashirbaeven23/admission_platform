{% extends 'base.html' %}

{% block title %}
{{ article.title }}
{% endblock %}

{% block content %}

<section class="py-24 bg-white min-h-screen">

    <div class="max-w-5xl mx-auto px-4">

        <div class="h-[500px] rounded-[40px] bg-gradient-to-r from-blue-600 to-indigo-700 flex items-center justify-center mb-12">

            <div class="text-[150px]">
                📰
            </div>

        </div>

        <div class="text-blue-600 font-black mb-6 text-xl">

            {{ article.created_at|date:"d.m.Y" }}

        </div>

        <h1 class="text-7xl font-black mb-10 leading-tight">

            {{ article.title }}

        </h1>

        <div class="text-2xl leading-relaxed text-slate-700">

            {{ article.content|linebreaks }}

        </div>

    </div>

</section>

{% endblock %}
